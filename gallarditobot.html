<div id="gb-root" aria-live="polite">
  <button id="gb-launcher" type="button" aria-label="Abrir GallarditoBot" aria-expanded="false">
    <img id="gb-launcher-img" alt="" aria-hidden="true">
  </button>

  <section id="gb-panel" role="dialog" aria-label="Asistente GallarditoBot" aria-modal="false" hidden>
    <header id="gb-head">
      <span id="gb-avatar" aria-hidden="true">
        <img id="gb-avatar-img" alt="">
      </span>
      <span id="gb-title">
        <strong>GallarditoBot</strong>
        <small>Asistente del CIFP Tony Gallardo</small>
      </span>
      <button id="gb-close" type="button" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </header>

    <div id="gb-log" role="log" aria-live="polite" tabindex="0"></div>

    <div id="gb-chips" aria-label="Preguntas frecuentes"></div>

    <div id="gb-inputrow">
      <input id="gb-input" type="text" autocomplete="off" placeholder="Escribe tu pregunta…" aria-label="Escribe tu pregunta">
      <button id="gb-send" type="button" aria-label="Enviar">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M4 12l16-8-6 8 6 8z" fill="currentColor"/></svg>
      </button>
    </div>
    <div id="gb-foot">GallarditoBot es un asistente informativo. Verifica siempre los datos oficiales.</div>
  </section>
</div>

<style>
  #gb-root, #gb-root *{ box-sizing:border-box; }
  #gb-root{
    position:fixed; right:20px; bottom:20px; z-index:999999;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.5; color:#2A2A2A;
  }
  #gb-launcher{
    width:62px; height:62px; border-radius:50%; border:2px solid #1B3A6B; cursor:pointer; padding:0;
    background:#fff; overflow:hidden; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 20px rgba(18,42,77,.35); transition:transform .15s ease, box-shadow .15s ease;
  }
  #gb-launcher:hover{ transform:translateY(-2px); box-shadow:0 8px 24px rgba(18,42,77,.45); }
  #gb-launcher:focus-visible{ outline:3px solid #A9C2E6; outline-offset:2px; }
  #gb-launcher-img{ width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }

  #gb-panel{
    position:absolute; right:0; bottom:74px;
    width:min(400px, calc(100vw - 32px));
    height:min(620px, calc(100vh - 110px));
    background:#fff; border-radius:16px; overflow:hidden; display:flex; flex-direction:column;
    box-shadow:0 16px 48px rgba(0,0,0,.22); border:1px solid #E6E2DD;
  }
  #gb-head{
    display:flex; align-items:center; gap:10px; padding:12px 14px;
    background:#1B3A6B; color:#fff;
  }
  #gb-avatar{
    width:40px; height:40px; border-radius:50%; background:#fff; overflow:hidden; flex:0 0 auto;
  }
  #gb-avatar-img{ width:100%; height:100%; object-fit:cover; display:block; }
  #gb-title{ display:flex; flex-direction:column; line-height:1.2; flex:1 1 auto; }
  #gb-title strong{ font-size:16px; font-weight:600; }
  #gb-title small{ font-size:12px; opacity:.85; }
  #gb-close{ background:transparent; border:none; color:#fff; cursor:pointer; padding:6px; border-radius:8px; display:flex; }
  #gb-close:hover{ background:rgba(255,255,255,.18); }
  #gb-close:focus-visible{ outline:2px solid #fff; outline-offset:1px; }

  #gb-log{ flex:1 1 auto; overflow-y:auto; padding:16px 14px; background:#F7F5F2; }
  #gb-log:focus-visible{ outline:none; }
  .gb-msg{ display:flex; margin-bottom:10px; }
  .gb-msg .gb-bubble{
    padding:9px 12px; border-radius:14px; max-width:82%; word-wrap:break-word;
    font-size:14.5px; box-shadow:0 1px 2px rgba(0,0,0,.06);
  }
  .gb-bot{ justify-content:flex-start; align-items:flex-end; }
  .gb-bavatar{ width:28px; height:28px; border-radius:50%; object-fit:cover; flex:0 0 auto; margin-right:8px; }
  .gb-bot .gb-bubble{ background:#fff; border:1px solid #ECE8E2; border-top-left-radius:4px; }
  .gb-user{ justify-content:flex-end; }
  .gb-user .gb-bubble{ background:#1B3A6B; color:#fff; border-top-right-radius:4px; }
  .gb-bubble strong{ font-weight:600; }
  .gb-bubble ul{ margin:6px 0 2px; padding-left:18px; }
  .gb-bubble li{ margin:2px 0; }
  .gb-bubble a{ color:inherit; text-decoration:underline; }

  .gb-typing .gb-bubble{ display:inline-flex; gap:4px; }
  .gb-typing span{ width:7px; height:7px; border-radius:50%; background:#B9B4AC; display:inline-block; animation:gb-blink 1.2s infinite; }
  .gb-typing span:nth-child(2){ animation-delay:.2s; }
  .gb-typing span:nth-child(3){ animation-delay:.4s; }
  @keyframes gb-blink{ 0%,60%,100%{opacity:.3} 30%{opacity:1} }
  @media (prefers-reduced-motion: reduce){ .gb-typing span{ animation:none; opacity:.6; } #gb-launcher{ transition:none; } }

  #gb-chips{ display:flex; flex-wrap:wrap; gap:6px; padding:8px 12px 0; background:#fff; }
  .gb-chip{
    border:1px solid #CBD6E6; background:#EEF3FA; color:#122A4D; cursor:pointer;
    font-size:12.5px; padding:6px 11px; border-radius:999px; line-height:1.2;
    font-family:inherit; transition:background .12s ease;
  }
  .gb-chip:hover{ background:#DCE7F5; }
  .gb-chip:focus-visible{ outline:2px solid #1B3A6B; outline-offset:1px; }

  #gb-inputrow{ display:flex; align-items:center; gap:8px; padding:10px 12px 6px; background:#fff; }
  #gb-input{
    flex:1 1 auto; border:1px solid #DDD7D0; border-radius:999px; padding:10px 14px;
    font-size:14.5px; font-family:inherit; color:#2A2A2A; outline:none; background:#fff;
  }
  #gb-input:focus{ border-color:#1B3A6B; box-shadow:0 0 0 3px rgba(27,58,107,.12); }
  #gb-send{
    flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:none; cursor:pointer;
    background:#1B3A6B; color:#fff; display:flex; align-items:center; justify-content:center;
  }
  #gb-send:hover{ background:#122A4D; }
  #gb-send:focus-visible{ outline:2px solid #1B3A6B; outline-offset:2px; }
  #gb-foot{ font-size:10.5px; color:#9A958E; text-align:center; padding:2px 12px 10px; background:#fff; }

  @media (max-width:480px){
    #gb-root{ right:14px; bottom:14px; }
    #gb-panel{ width:calc(100vw - 24px); height:calc(100vh - 96px); height:calc(100dvh - 96px); right:-6px; }
  }
</style>

  function norm(s){
    return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
  }

  function listaCiclos(arr){
    var html = "<ul>";
    for(var i=0;i<arr.length;i++){
      var c = arr[i];
      html += "<li>" + c.n + " <em>(" + c.niv + ")</em></li>";
    }
    return html + "</ul>";
  }

  function ofertaCompleta(){
    var html = "Esta es nuestra oferta formativa por familias:";
    for(var f=0; f<FAMILIAS.length; f++){
      var fam = FAMILIAS[f].nombre;
      var enFam = CICLOS.filter(function(c){ return c.fam === fam; });
      if(!enFam.length) continue;
      html += "<br><br><strong>" + fam + "</strong>" + listaCiclos(enFam);
    }
    html += "<br>¿Quieres saber más de alguno en concreto? Escribe su nombre.";
    return html;
  }

  function detalleCiclo(c){

  function buscar(texto){
    var q = norm(texto);
    if(!q) return null;
    var qtok = q.split(" ");
    var best = null, bestScore = 0, bestLen = 0;
    for(var i=0;i<INTENTS.length;i++){
      var keys = INTENTS[i].keys, score = 0, maxLen = 0;
      for(var k=0;k<keys.length;k++){
        var nk = norm(keys[k]); if(!nk) continue;
        var words = nk.split(" "), hit=false, w=0;
        if(words.length > 1){ if(q.indexOf(nk) !== -1){ hit=true; w = 2 + words.length; } }
        else { if(qtok.indexOf(nk) !== -1){ hit=true; w = 1; } }
        if(hit){ score += w; if(nk.length > maxLen) maxLen = nk.length; }
      }
      if(score > bestScore || (score === bestScore && maxLen > bestLen)){
        bestScore = score; bestLen = maxLen; best = INTENTS[i];
      }
    }
    if(best && bestScore >= 1) return best.answer();
    return null;
  }

  var FALLBACK = "No tengo esa información cargada. Puedo ayudarte con los <strong>ciclos formativos</strong>, las <strong>fechas y plazos</strong> y el <strong>precio de la matrícula</strong>. Prueba con uno de los botones de abajo. 👇".replace("👇","");

  document.getElementById("gb-launcher-img").src = ICON;

  function scrollBottom(){ log.scrollTop = log.scrollHeight; }

  function addMsg(text, who){
    var row = document.createElement("div");
    row.className = "gb-msg " + (who === "user" ? "gb-user" : "gb-bot");
    if(who !== "user"){
      var av = document.createElement("img");
      av.className = "gb-bavatar"; av.alt = ""; av.src = ICON;
      row.appendChild(av);
    }
    var b = document.createElement("div");
    b.className = "gb-bubble";
    if(who === "user"){ b.textContent = text; } else { b.innerHTML = text; }
    row.appendChild(b);
    log.appendChild(row);
    scrollBottom();
  }

  function typing(on){
    var t = document.getElementById("gb-typing");
    if(on){
      if(t) return;
      var row = document.createElement("div");
      row.id = "gb-typing"; row.className = "gb-msg gb-bot gb-typing";
      row.innerHTML = '<img class="gb-bavatar" alt="" src="' + ICON + '"><div class="gb-bubble"><span></span><span></span><span></span></div>';
      log.appendChild(row); scrollBottom();
    } else if(t){ t.remove(); }
  }

  function answer(text){
    typing(true);
    setTimeout(function(){
      typing(false);
      var resp = buscar(text);
      addMsg(resp || FALLBACK, "bot");
    }, 420);
  }

  function send(text){
    var v = (text != null ? text : input.value).trim();
    if(!v) return;
    addMsg(v, "user");
    input.value = "";
    answer(v);
  }

  function buildChips(){
    chipsBox.innerHTML = "";
    CHIPS.forEach(function(label){
      var c = document.createElement("button");
      c.type = "button"; c.className = "gb-chip"; c.textContent = label;
      c.addEventListener("click", function(){ send(label); });
      chipsBox.appendChild(c);
    });
  }

  function openPanel(){
    panel.hidden = false;
    launcher.setAttribute("aria-expanded", "true");
    if(!started){
      started = true;
      addMsg("¡Hola! 👋 Soy <strong>GallarditoBot</strong>, el asistente del CIFP Tony Gallardo. Pregúntame por nuestros ciclos, las fechas de matrícula o el precio. ¿En qué te ayudo?".replace("👋",""), "bot");
      buildChips();
    }
    setTimeout(function(){ input.focus(); }, 50);
  }

  function closePanel(){
    panel.hidden = true;
    launcher.setAttribute("aria-expanded", "false");
    launcher.focus();
  }

  launcher.addEventListener("click", function(){ panel.hidden ? openPanel() : closePanel(); });
  closeBtn.addEventListener("click", closePanel);
  sendBtn.addEventListener("click", function(){ send(); });
  input.addEventListener("keydown", function(e){ if(e.key === "Enter"){ e.preventDefault(); send(); } });
  document.addEventListener("keydown", function(e){ if(e.key === "Escape" && !panel.hidden){ closePanel(); } });

  // El bot inicia la conversación solo al abrir la web
  setTimeout(openPanel, 700);
})();
